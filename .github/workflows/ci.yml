name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r python/requirements.txt
      - run: pytest python/tests/ -v
        working-directory: .

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./... -v
        working-directory: go

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
      - run: cargo test -v
        working-directory: rust

  test-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements.txt
      - run: pytest tests/ -v

  build-and-push:
    needs: [test-python, test-go, test-rust, test-compose]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push python-app
        uses: docker/build-push-action@v5
        with:
          context: ./python
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab11-python-app:latest
      - name: Build and push go-info
        uses: docker/build-push-action@v5
        with:
          context: ./go
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab11-go-info:latest
      - name: Build and push rust-textutil
        uses: docker/build-push-action@v5
        with:
          context: ./rust
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lab11-rust-textutil:latest
